<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sci-Fi Universe</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0b0f1a, #000);
  color: #e6e6e6;
}

/* HEADER */
header {
  padding: 60px 20px;
  text-align: center;
  background: linear-gradient(to bottom, #111a33, transparent);
}

h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

.subtitle {
  color: #9fb3ff;
  font-size: 18px;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
  padding: 40px 20px;
}

/* CARDS */
.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  margin: 15px 0;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.02);
  border-color: #4d7cff;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 30px;
  color: #666;
  font-size: 14px;
}
</style>

</head>

<body>

<header>
  <h1>🚀 My Sci-Fi Universe</h1>
  <div class="subtitle">Stories from a distant future</div>
</header>

<div class="container">

  <h2>📚 Stories</h2>

  <div class="card">
    <h3>🌌 Story 1</h3>
    <p>A journey beyond known space begins...</p>
  </div>

  <div class="card">
    <h3>🪐 Story 2</h3>
    <p>Something is wrong with the timeline...</p>
  </div>

  <h2>🌍 About</h2>

  <div class="card">
    <p>This is my personal sci-fi universe where I publish my stories and ideas.</p>
  </div>

</div>

<footer>
  Made with GitHub Pages ✨
</footer>

</body>
</html>
